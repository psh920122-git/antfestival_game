<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알렉스 구출 미션: 길 피하기 | 앤트스튜디오</title>
    <style>
        :root {
            --primary: #00ffcc;
            --danger: #ff0055;
            --bg: #0a0a0c;
            --path: #1a1a1f;
            --font: 'Pretendard', sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: var(--font);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: var(--path);
            border: 2px solid #333;
            margin-top: 50px;
            cursor: none; /* Hide cursor for immersion */
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .wall {
            position: absolute;
            background: #222;
            border: 1px solid #444;
        }

        #player {
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary);
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.1s;
        }

        .obstacle {
            position: absolute;
            font-size: 2rem;
            z-index: 50;
        }

        #goal {
            position: absolute;
            right: 20px;
            top: 220px;
            width: 60px;
            height: 60px;
            background: rgba(255, 215, 0, 0.2);
            border: 2px dashed #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .ui {
            margin-top: 20px;
            text-align: center;
        }

        h1 { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
        }

        .btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }

        .msg { font-size: 1.5rem; margin-bottom: 20px; }
        
        #status-msg {
            position: fixed;
            bottom: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .trail {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(0, 255, 204, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: fade 1s forwards;
        }

        @keyframes fade {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.5); }
        }
    </style>
</head>
<body>

    <div class="ui">
        <h1>🐜 ROAD AVOIDANCE</h1>
        <p>에어마우스를 움직여 알렉스(🎖️)에게 도달하세요!</p>
    </div>

    <div id="game-container">
        <div id="player">🐜</div>
        <div id="goal">🎖️</div>
        
        <!-- Walls will be generated by JS -->
        
        <div id="start-overlay" class="overlay">
            <p class="msg">쥐 맥스의 감시를 피해<br>병정개미 알렉스를 구출하세요!</p>
            <button class="btn" onclick="startGame()">START MISSION</button>
        </div>

        <div id="end-overlay" class="overlay" style="display: none;">
            <p id="end-msg" class="msg"></p>
            <button class="btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <div id="status-msg">⚠️ 벽이나 장애물(🐭)에 부딪히면 초기화됩니다!</div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const goal = document.getElementById('goal');
        const startOverlay = document.getElementById('start-overlay');
        const endOverlay = document.getElementById('end-overlay');
        const endMsg = document.getElementById('end-msg');

        let isGaming = false;
        let obstacles = [];

        // Maze Definition (Simple obstacles for demo)
        const mazePaths = [
            { t: 0, l: 0, w: 200, h: 500 }, // left wall
            { t: 0, l: 200, w: 600, h: 100 }, // top wall
            { t: 400, l: 200, w: 600, h: 100 }, // bottom wall
            { t: 100, l: 350, w: 100, h: 200 }, // middle obstacle 1
            { t: 200, l: 550, w: 100, h: 200 }, // middle obstacle 2
        ];

        function initMaze() {
            mazePaths.forEach(p => {
                const wall = document.createElement('div');
                wall.className = 'wall';
                wall.style.top = p.t + 'px';
                wall.style.left = p.l + 'px';
                wall.style.width = p.w + 'px';
                wall.style.height = p.h + 'px';
                container.appendChild(wall);
            });

            // Moving Rats
            for(let i=0; i<3; i++) {
                createRat();
            }
        }

        function createRat() {
            const rat = document.createElement('div');
            rat.className = 'obstacle';
            rat.innerHTML = '🐭';
            rat.style.left = (450 + Math.random() * 200) + 'px';
            rat.style.top = (150 + Math.random() * 200) + 'px';
            container.appendChild(rat);
            
            let dx = (Math.random() - 0.5) * 4;
            let dy = (Math.random() - 0.5) * 4;

            function move() {
                if(!isGaming) return;
                let l = parseFloat(rat.style.left);
                let t = parseFloat(rat.style.top);
                
                if(l < 220 || l > 750) dx *= -1;
                if(t < 110 || t > 360) dy *= -1;
                
                rat.style.left = (l + dx) + 'px';
                rat.style.top = (t + dy) + 'px';
                requestAnimationFrame(move);
            }
            move();
            obstacles.push(rat);
        }

        function startGame() {
            startOverlay.style.display = 'none';
            isGaming = true;
            initMaze();
        }

        function gameOver(win) {
            isGaming = false;
            endOverlay.style.display = 'flex';
            if(win) {
                endMsg.innerHTML = "🎖️ MISSION COMPLETE!<br>알렉스를 성공적으로 구출했습니다!";
                endMsg.style.color = "var(--primary)";
            } else {
                endMsg.innerHTML = "🐭 맥스에게 들켰습니다!<br>일꾼개미 닉이 도망쳤습니다.";
                endMsg.style.color = "var(--danger)";
            }
        }

        container.addEventListener('mousemove', (e) => {
            if(!isGaming) return;

            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            player.style.left = (x - 15) + 'px';
            player.style.top = (y - 15) + 'px';

            // Collision Detection
            checkCollision(x, y);
            
            // Goal check
            const gRect = goal.getBoundingClientRect();
            const gX = gRect.left - rect.left + 30;
            const gY = gRect.top - rect.top + 30;
            const dist = Math.sqrt((x - gX)**2 + (y - gY)**2);
            if(dist < 40) gameOver(true);

            // Trail
            if(Math.random() > 0.8) {
                const trail = document.createElement('div');
                trail.className = 'trail';
                trail.style.left = x + 'px';
                trail.style.top = y + 'px';
                container.appendChild(trail);
                setTimeout(() => trail.remove(), 1000);
            }
        });

        function checkCollision(x, y) {
            // Wall collision
            mazePaths.forEach(p => {
                if(x > p.l && x < p.l + p.w && y > p.t && y < p.t + p.h) {
                    gameOver(false);
                }
            });

            // Rat collision
            obstacles.forEach(rat => {
                const rL = parseFloat(rat.style.left);
                const rT = parseFloat(rat.style.top);
                const dist = Math.sqrt((x - (rL+20))**2 + (y - (rT+20))**2);
                if(dist < 25) gameOver(false);
            });
        }
    </script>
</body>
</html>
