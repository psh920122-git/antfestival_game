<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANT RESCUE: Map Editor</title>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #0f172a;
            --sidebar: #1e293b;
            --highlight: #38bdf8;
            --danger: #ef4444;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--sidebar);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 1.2rem; color: var(--primary); margin-bottom: 10px; }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tool-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-btn.active {
            background: var(--highlight);
            color: black;
            font-weight: bold;
        }

        .tool-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

        /* Canvas Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #editor-canvas {
            background: #1a1a1f;
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-export { background: var(--primary); color: black; }
        .btn-clear { background: var(--danger); color: white; }

        /* Property Panel */
        #props-panel {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        input[type="number"] {
            background: #0f172a;
            border: 1px solid #333;
            color: white;
            padding: 5px;
            width: 60px;
            border-radius: 4px;
        }

        .export-output {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 600px;
            display: none;
            z-index: 100;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #0f172a;
            color: #10b981;
            font-family: monospace;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>🛠️ MAP EDITOR</h1>
        
        <div class="tool-group">
            <button class="tool-btn active" data-tool="wall">🧱 Wall (벽 그리기)</button>
            <button class="tool-btn" data-tool="rat">🐭 Rat (쥐 배치)</button>
            <button class="tool-btn" data-tool="player">🐜 Player (시작점)</button>
            <button class="tool-btn" data-tool="goal">🎖️ Goal (목표지점)</button>
        </div>

        <div id="props-panel">
            <p>선택된 요소 속성</p>
            <hr style="margin: 10px 0; opacity: 0.1;">
            <div id="rat-props" style="display: none;">
                <label>속도 (Speed): </label>
                <input type="number" id="prop-rat-speed" value="2" step="0.5" min="0.1">
            </div>
            <div id="no-selection">요소를 선택하세요</div>
        </div>

        <div class="controls">
            <button class="btn-action btn-export" onclick="exportData()">내보내기 (Export)</button>
            <button class="btn-action btn-clear" onclick="clearMap()">초기화</button>
        </div>
        <p style="font-size: 0.8rem; color: #666; margin-top: auto;">
            * Wall: 드래그하여 생성<br>
            * 우클릭: 요소 삭제
        </p>
    </div>

    <div class="main">
        <canvas id="editor-canvas" width="800" height="500"></canvas>
    </div>

    <!-- Export Overlay -->
    <div id="export-overlay" class="export-output">
        <h3>📍 데이터 추출 완료</h3>
        <p style="font-size: 0.8rem; margin-bottom: 10px;">아래 코드를 복사하여 <b>map_data.js</b> 파일에 덮어쓰세요.</p>
        <textarea id="json-result" readonly></textarea>
        <button class="btn-action btn-export" onclick="copyAndClose()">복사 및 닫기</button>
    </div>

    <script>
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');
        const toolBtns = document.querySelectorAll('.tool-btn');
        
        let currentTool = 'wall';
        let isDrawing = false;
        let startX, startY;
        
        let mapData = {
            walls: [],
            rats: [],
            player: { x: 50, y: 450 },
            goal: { x: 750, y: 50 }
        };

        // UI Setup
        toolBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                toolBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                updatePropsPanel();
            });
        });

        function updatePropsPanel() {
            document.getElementById('rat-props').style.display = (currentTool === 'rat') ? 'block' : 'none';
            document.getElementById('no-selection').style.display = (currentTool === 'rat') ? 'none' : 'block';
        }

        // Editor Logic
        canvas.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Only left click
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            
            if (currentTool === 'wall') {
                isDrawing = true;
            } else if (currentTool === 'rat') {
                const speed = parseFloat(document.getElementById('prop-rat-speed').value);
                mapData.rats.push({ x: startX - 20, y: startY - 20, speed: speed, id: 'rat_' + Date.now() });
                draw();
            } else if (currentTool === 'player') {
                mapData.player = { x: startX, y: startY };
                draw();
            } else if (currentTool === 'goal') {
                mapData.goal = { x: startX, y: startY };
                draw();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const currX = e.clientX - rect.left;
            const currY = e.clientY - rect.top;
            
            draw();
            // Preview current wall drawing
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            ctx.strokeRect(startX, startY, currX - startX, currY - startY);
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;
            
            const w = endX - startX;
            const h = endY - startY;
            
            if (Math.abs(w) > 5 && Math.abs(h) > 5) {
                mapData.walls.push({
                    x: w > 0 ? startX : endX,
                    y: h > 0 ? startY : endY,
                    w: Math.abs(w),
                    h: Math.abs(h)
                });
            }
            
            isDrawing = false;
            draw();
        });

        // Right click to delete
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Check walls
            mapData.walls = mapData.walls.filter(w => !(x > w.x && x < w.x + w.w && y > w.y && y < w.y + w.h));
            // Check rats
            mapData.rats = mapData.rats.filter(r => !(x > r.x && x < r.x + 40 && y > r.y && y < r.y + 40));
            
            draw();
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Grid (Subtle)
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=50) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Draw Walls
            ctx.fillStyle = '#222';
            ctx.strokeStyle = '#444';
            mapData.walls.forEach(w => {
                ctx.fillRect(w.x, w.y, w.w, w.h);
                ctx.strokeRect(w.x, w.y, w.w, w.h);
            });

            // Draw Rats
            ctx.font = '30px Arial';
            mapData.rats.forEach(r => {
                ctx.fillText('🐭', r.x, r.y + 30);
            });

            // Draw Player
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.arc(mapData.player.x, mapData.player.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = '15px Arial';
            ctx.fillText('🐜', mapData.player.x - 10, mapData.player.y + 5);

            // Draw Goal
            ctx.strokeStyle = '#ffd700';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(mapData.goal.x, mapData.goal.y, 25, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillText('🎖️', mapData.goal.x - 12, mapData.goal.y + 8);
        }

        function exportData() {
            const result = `const MAP_DATA = ${JSON.stringify(mapData, null, 4)};`;
            document.getElementById('json-result').value = result;
            document.getElementById('export-overlay').style.display = 'block';
        }

        function copyAndClose() {
            const textarea = document.getElementById('json-result');
            textarea.select();
            document.execCommand('copy');
            document.getElementById('export-overlay').style.display = 'none';
            alert('클립보드에 복사되었습니다!');
        }

        function clearMap() {
            if(confirm('맵을 초기화할까요?')) {
                mapData.walls = [];
                mapData.rats = [];
                draw();
            }
        }

        draw(); // Initial draw
    </script>
</body>
</html>
