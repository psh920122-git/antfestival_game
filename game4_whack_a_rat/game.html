<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쥐 소탕 작전: 파이널 배틀 | 앤트스튜디오</title>
    <style>
        :root {
            --primary: #FFD700;
            --secondary: #FF4500;
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e94560;
            --font: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: var(--font);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            letter-spacing: -1px;
        }

        p.desc {
            color: #ccc;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        .hole {
            aspect-ratio: 1 / 1;
            background: #0f172a;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 4px solid #1e293b;
            transition: transform 0.1s;
        }

        .hole::after {
            content: attr(data-key);
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.2);
            font-weight: bold;
        }

        .rat {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            transition: top 0.1s ease-out;
            cursor: pointer;
        }

        .rat.up {
            top: 0;
        }

        .hit {
            animation: hit-anim 0.2s ease-out;
        }

        @keyframes hit-anim {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); filter: hue-rotate(90deg); }
            100% { transform: scale(1); }
        }

        .hammer-effect {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: 10;
            animation: hammer-anim 0.3s forwards;
            opacity: 0;
        }

        @keyframes hammer-anim {
            0% { opacity: 1; transform: translateY(-20px) rotate(-45deg); }
            100% { opacity: 0; transform: translateY(0) rotate(0deg); }
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        button.start-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        button.start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .result-score {
            font-size: 4rem;
            color: var(--primary);
            margin: 20px 0;
        }

        .key-hint {
            margin-top: 30px;
            color: #666;
            font-size: 0.8rem;
        }

        .combo {
            position: absolute;
            top: -20px;
            right: -10px;
            background: var(--secondary);
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
            transform: rotate(15deg);
            z-index: 5;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐭 RAT SWEEP</h1>
        <p class="desc">넘버패드(1-9)를 사용하여 쥐를 잡으세요!</p>

        <div class="stats">
            <div class="stat-item">
                <span id="score" class="stat-value">0</span>
                <span class="stat-label">SCORE</span>
            </div>
            <div class="stat-item">
                <span id="time" class="stat-value">30</span>
                <span class="stat-label">TIME</span>
            </div>
            <div class="stat-item">
                <span id="max-combo" class="stat-value">0</span>
                <span class="stat-label">MAX COMBO</span>
            </div>
        </div>

        <div class="grid">
            <!-- Grid Layout (matching NumPad) -->
            <!-- Top Row: 7, 8, 9 -->
            <div class="hole" id="hole-7" data-key="7"><div class="rat">🐭</div></div>
            <div class="hole" id="hole-8" data-key="8"><div class="rat">🐭</div></div>
            <div class="hole" id="hole-9" data-key="9"><div class="rat">🐭</div></div>
            <!-- Mid Row: 4, 5, 6 -->
            <div class="hole" id="hole-4" data-key="4"><div class="rat">🐭</div></div>
            <div class="hole" id="hole-5" data-key="5"><div class="rat">🐭</div></div>
            <div class="hole" id="hole-6" data-key="6"><div class="rat">🐭</div></div>
            <!-- Bottom Row: 1, 2, 3 -->
            <div class="hole" id="hole-1" data-key="1"><div class="rat">🐭</div></div>
            <div class="hole" id="hole-2" data-key="2"><div class="rat">🐭</div></div>
            <div class="hole" id="hole-3" data-key="3"><div class="rat">🐭</div></div>
        </div>

        <div class="key-hint">
            ⌨️ 키보드 오른쪽 넘버패드를 사용하세요!
        </div>
    </div>

    <!-- Start/End Overlay -->
    <div id="overlay" class="overlay visible">
        <h2 id="msg-title" style="font-size: 3rem; color: var(--primary);">READY?</h2>
        <div id="final-score-container" style="display: none;">
            <p>최종 점수</p>
            <div id="final-score" class="result-score">0</div>
        </div>
        <button id="start-btn" class="start-btn">GAME START</button>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const scoreBoard = document.querySelector('#score');
        const timeBoard = document.querySelector('#time');
        const comboBoard = document.querySelector('#max-combo');
        const overlay = document.querySelector('#overlay');
        const startBtn = document.querySelector('#start-btn');
        const finalScoreContainer = document.querySelector('#final-score-container');
        const finalScore = document.querySelector('#final-score');
        const msgTitle = document.querySelector('#msg-title');

        let lastHole;
        let timeUp = false;
        let score = 0;
        let timeLeft = 30;
        let timer;
        let currentCombo = 0;
        let maxCombo = 0;

        // Sound simulation (Visual only or small beep if we wanted, but let's stick to visual)
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(400, 1000);
            const hole = randomHole(holes);
            const rat = hole.querySelector('.rat');
            
            rat.classList.add('up');
            
            setTimeout(() => {
                rat.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            resetGame();
            overlay.classList.remove('visible');
            timeUp = false;
            peep();
            
            timer = setInterval(() => {
                timeLeft--;
                timeBoard.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endGame();
                }
            }, 1000);
        }

        function resetGame() {
            score = 0;
            timeLeft = 30;
            currentCombo = 0;
            maxCombo = 0;
            scoreBoard.textContent = 0;
            timeBoard.textContent = 30;
            comboBoard.textContent = 0;
            finalScoreContainer.style.display = 'none';
        }

        function endGame() {
            timeUp = true;
            msgTitle.textContent = "TIME OVER!";
            finalScoreContainer.style.display = 'block';
            finalScore.textContent = score;
            startBtn.textContent = "RETRY";
            overlay.classList.add('visible');
        }

        function whack(e, holeElement) {
            const rat = holeElement.querySelector('.rat');
            if (!rat.classList.contains('up')) {
                currentCombo = 0;
                return;
            }
            
            rat.classList.remove('up');
            score += 10 + (currentCombo * 2);
            currentCombo++;
            if (currentCombo > maxCombo) maxCombo = currentCombo;
            
            scoreBoard.textContent = score;
            comboBoard.textContent = maxCombo;
            
            // Visual Hammer Effect
            const hammer = document.createElement('div');
            hammer.className = 'hammer-effect';
            hammer.textContent = '🔨';
            holeElement.appendChild(hammer);
            setTimeout(() => hammer.remove(), 300);
            
            // Hit Animation
            rat.classList.add('hit');
            setTimeout(() => rat.classList.remove('hit'), 200);
        }

        // Click support
        holes.forEach(hole => hole.addEventListener('click', (e) => whack(e, hole)));

        // Keyboard support (NumPad mapping)
        window.addEventListener('keydown', (e) => {
            if (timeUp) return;
            
            let key = e.key;
            // Handle both Numpad and regular numbers
            if (key.startsWith('Numpad')) key = key.replace('Numpad', '');
            
            const targetHole = document.querySelector(`#hole-${key}`);
            if (targetHole) {
                whack(null, targetHole);
            }
        });

        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
